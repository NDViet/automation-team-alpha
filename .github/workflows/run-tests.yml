name: Run Automation Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Daily nightly run at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      app_url:
        description: 'Override AUT base URL'
        required: false
        default: 'https://the-internet.herokuapp.com'

# ── Cancel in-progress runs on the same branch ──────────────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# packages:write is required to push/pull images from GHCR
permissions:
  contents: read
  packages: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build the test-runner Docker image (linux/amd64 + linux/arm64) and push
  # it to GHCR as a multi-arch manifest.
  # ─────────────────────────────────────────────────────────────────────────────
  build-image:
    name: Build & Push Test Runner Image
    runs-on: ubuntu-latest
    outputs:
      ghcr-sha-tag: ${{ steps.sha-tag.outputs.ghcr-sha-tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU lets the amd64 runner cross-compile the arm64 layer.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Buildx is required for --platform multi-arch builds.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Compute image tags once so every subsequent step is consistent.
      # GHCR image names must be lowercase, so we normalise the repository slug.
      # 'latest' is only emitted on the main branch; metadata-action handles
      # the conditional via the type=raw,enable= syntax.
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Expose the SHA tag as a plain output so run-tests can reference it.
      - name: Export SHA tag
        id: sha-tag
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "ghcr-sha-tag=ghcr.io/${REPO_LOWER}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build for both amd64 and arm64, push the multi-arch manifest in one step.
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BASE_IMAGE=ndviet/test-automation-java-common:latest
            GITHUB_ACTOR=${{ github.actor }}
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

      # Print offline pull/run instructions for team members
      - name: Write offline usage summary
        run: |
          GHCR_SHA="${{ steps.sha-tag.outputs.ghcr-sha-tag }}"
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          GHCR_LATEST="ghcr.io/${REPO_LOWER}:latest"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Docker image published to GHCR

          | Tag | Use case |
          |-----|----------|
          | \`${GHCR_SHA}\` | Pin to this exact commit |
          | \`${GHCR_LATEST}\` | Latest stable (main branch only) |

          All framework JARs and test sources are baked in — **no credentials needed to run.**

          ### Run tests offline

          \`\`\`bash
          # Pull the image (one-time — no credentials needed)
          docker pull ${GHCR_LATEST}

          # Run the full cross-browser suite
          docker run --rm \\
            -v "\$(pwd)/build:/workspace/build" \\
            ${GHCR_LATEST}

          # Run a single browser
          docker run --rm \\
            -v "\$(pwd)/build:/workspace/build" \\
            ${GHCR_LATEST} \\
            ./gradlew test --no-daemon -Dbrowser=firefox

          # Override the target URL
          docker run --rm \\
            -e APP_URL=https://staging.example.com \\
            -v "\$(pwd)/build:/workspace/build" \\
            ${GHCR_LATEST}
          \`\`\`

          Reports are written to \`./build/reports/tests/test/index.html\` on the host.
          EOF

  # ─────────────────────────────────────────────────────────────────────────────
  # Start Selenium Grid, pull the test-runner image, run all 15 test blocks
  # (5 feature groups × Chrome / Edge / Firefox) via RemoteWebDriver.
  # ─────────────────────────────────────────────────────────────────────────────
  run-tests:
    name: Execute Tests (Selenium Grid)
    needs: build-image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull test-runner image
        run: docker pull ${{ needs.build-image.outputs.ghcr-sha-tag }}

      # Start hub + browser nodes defined in docker-compose.yml.
      # The Grid is on the 'automation-grid_default' Docker network; the
      # test-runner container joins that network so it can reach selenium-hub.
      - name: Start Selenium Grid
        run: docker compose up -d

      # Wait until the hub reports ready, then give nodes time to register.
      - name: Wait for Selenium Grid to be ready
        run: |
          echo "Waiting for Selenium Hub..."
          timeout 120 bash -c \
            'until curl -sf http://localhost:4444/status | grep -q "\"ready\":true"; do sleep 5; done'
          echo "Hub ready. Waiting 30 s for browser nodes to register..."
          sleep 30
          docker compose ps

      - name: Run tests against Selenium Grid
        run: |
          docker run --rm \
            --name automation-test-runner \
            --network automation-grid_default \
            -e APP_URL=${{ inputs.app_url || 'https://the-internet.herokuapp.com' }} \
            -v ${{ github.workspace }}/build:/workspace/build \
            ${{ needs.build-image.outputs.ghcr-sha-tag }} \
            ./gradlew test --no-daemon \
              -Dselenium.web_driver.target=REMOTE \
              -Dselenium.hub.url=http://selenium-hub:4444/wd/hub \
              -DAPP_URL=${{ inputs.app_url || 'https://the-internet.herokuapp.com' }} \
              -Dsuite=testng-grid.xml

      - name: Tear down Selenium Grid
        if: always()
        run: docker compose down

      - name: Upload TestNG HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testng-html-report-${{ github.run_number }}
          path: build/reports/tests/test/
          retention-days: 14

      - name: Upload TestNG XML results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testng-xml-results-${{ github.run_number }}
          path: build/test-results/test/
          retention-days: 14

      - name: Publish test results summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: TestNG Results
          path: build/test-results/test/TEST-*.xml
          reporter: java-junit
          fail-on-error: false
