# ── Platform ingestion SDK configuration ──────────────────────────────────────
#
# platform.url defaults to the locally-running platform instance.
# Override via PLATFORM_URL env var for CI or a remote environment.
#
# platform.api-key has no default — supply via PLATFORM_API_KEY env var.
# The SDK disables itself silently if api-key is absent.
#
# In CI, set PLATFORM_URL / PLATFORM_API_KEY as repository secrets and
# pass them to the test-runner container via -e (see run-tests.yml).
# ──────────────────────────────────────────────────────────────────────────────

platform.url=http://localhost:8081
# Default key for local platform instance. Override via PLATFORM_API_KEY env var in CI.
platform.api-key=local-dev

platform.team-id=automation-team-alpha
platform.project-id=the-internet
platform.enabled=true

# Overridden in CI by the TEST_ENV environment variable.
platform.environment=local
